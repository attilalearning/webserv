#Automated test - webserv configuration file

server {
	listen 8080;
	host 127.0.0.1;
	server_name localhost;

	#Maximum client body size(1MB)
	client_max_body_size 1M;

	#Root directory
	root ./tests/request_routing/resources/test_DELETE_requests/www;

	#Default index file
	index abc.html;

	#Root location - everything is disabled
	location / {
		allowed_methods GET;
		root ./tests/request_routing/resources/test_DELETE_requests/www/html;
		#index index.html;
		#autoindex on;
	}

	location /read_only_dir/ {
		allowed_methods GET DELETE;
		root ./tests/request_routing/resources/test_DELETE_requests/www/html;
		autoindex on;
	}

	location /read_and_write_dir/ {
		allowed_methods GET DELETE;
		root ./tests/request_routing/resources/test_DELETE_requests/www/html;
		autoindex on;
	}
}
