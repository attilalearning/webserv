#Automated test - webserv configuration file

server {
	listen 8080;
	host 127.0.0.1;
	server_name localhost;

	#Maximum client body size(1MB)
	client_max_body_size 1M;

	#Root directory
	root ./www;

	#Default index file
	index abc.html;

	#Root location
	location / {
		#allowed_methods GET;
		#root ./www/html;
		#index index.html;
		autoindex off;
	}
}
