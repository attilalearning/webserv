# Sample webserv configuration file

server {
    listen 8080;
    host 127.0.0.1;
    listen 8081;
    server_name localhost;
    
    # Maximum client body size (1MB)
    client_max_body_size 1M;
    
    # Default error pages
    error_page 404 /errors/404.html;
    error_page 403 /errors/403.html;
    error_page 500 /errors/500.html;
    
    # Root directory
    root ./www;
    
    # Default index file
    index abc.html;
    
    # Root location
    location / {
        allowed_methods GET;
        root ./www/html;
        #index index.html;
        autoindex off;
    }

    location /ima/ {
        allowed_methods GET;
        root ./www/html/test/;
        index index.html;
        #autoindex on;
		#return 302 https://www.google.com;
    }

    location /test/ {
        allowed_methods GET;
        root ./www/html/image/description;
        index index.html;
        autoindex on;
    }

    location /img/ {
        allowed_methods GET;
        root ./www/html/images;
        index index.html;
        autoindex on;
    }

    # CGI location for PHP files
    #location /cgi-bin {
    #    allowed_methods GET POST;
    #    root ./www;
    #    cgi_pass .php /usr/bin/php-cgi;
    #}
    
    # Upload location
    #location /upload {
    #    allowed_methods POST DELETE;
    #    root ./www;
    #    upload_path ./www/uploads;
    #    client_max_body_size 10M;
    #}
    
    # Redirect example
    #location /redirect {
