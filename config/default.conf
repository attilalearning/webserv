# Sample webserv configuration file

server {
    listen 8080;
    listen 8081;
    server_name localhost;
    
    # Maximum client body size (1MB)
    client_max_body_size 1M;
    
    # Default error pages
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    
    # Root directory
    root ./www;
    
    # Default index file
    index index.html;
    
    # Root location
    location / {
        allowed_methods GET POST DELETE;
        root ./www;
        index index.html;
        autoindex off;
    }
    
    # CGI location for PHP files
    location /cgi-bin {
        allowed_methods GET POST;
        root ./www;
        cgi_pass .php /usr/bin/php-cgi;
    }
    
    # Upload location
    location /upload {
        allowed_methods POST DELETE;
        root ./www;
        upload_path ./www/uploads;
        client_max_body_size 10M;
    }
    
    # Redirect example
    location /redirect {
        return 301 https://www.example.com;
    }
    
    # Directory listing enabled
    location /files {
        allowed_methods GET;
        root ./www;
        autoindex on;
    }
}

server {
    listen 8082;
    server_name example.com;
    
    root ./www2;
    index index.html;
    
    location / {
        allowed_methods GET;
        root ./www2;
        index index.html;
    }
}