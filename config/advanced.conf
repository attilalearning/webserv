# Advanced webserv configuration example
# This demonstrates multiple servers and various configuration options

# Server 1: Main website on port 8080
server {
    listen 8080;
    server_name localhost www.example.local;
    
    # Global settings
    client_max_body_size 5M;
    root ./www;
    index index.html index.htm;
    
    # Custom error pages
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    error_page 403 /errors/403.html;
    
    # Root location - serve static files
    location / {
        allowed_methods GET POST;
        root ./www;
        index index.html;
        autoindex off;
    }
    
    # API endpoint
    location /api {
        allowed_methods GET POST DELETE;
        root ./www;
    }
    
    # File uploads with larger size limit
    location /upload {
        allowed_methods POST DELETE;
        root ./www;
        upload_path ./www/uploads;
        client_max_body_size 50M;
    }
    
    # CGI for PHP scripts
    location /cgi-bin {
        allowed_methods GET POST;
        root ./www;
        cgi_pass .php /usr/bin/php-cgi;
    }
    
    # Python CGI
    location /py-cgi {
        allowed_methods GET POST;
        root ./www;
        cgi_pass .py /usr/bin/python3;
    }
    
    # Public files with directory listing
    location /files {
        allowed_methods GET;
        root ./www;
        autoindex on;
    }
    
    # Protected area - GET only
    location /protected {
        allowed_methods GET;
        root ./www;
        autoindex off;
    }
    
    # Redirect old URLs
    location /old-page {
        return 301 /;
    }
    
    # External redirect
    location /external {
        return 302 https://www.example.com;
    }
}

# Server 2: Alternative website on port 8081
server {
    listen 8081;
    server_name alt.example.local;
    
    client_max_body_size 10M;
    root ./www2;
    index index.html;
    
    error_page 404 /404.html;
    
    location / {
        allowed_methods GET;
        root ./www2;
        index index.html;
        autoindex on;
    }
}

# Server 3: API-only server on port 8082
server {
    listen 8082;
    server_name api.example.local;
    
    client_max_body_size 1M;
    
    location /api {
        allowed_methods GET POST DELETE;
        root ./api;
        cgi_pass .py /usr/bin/python3;
    }
    
    location / {
        return 404;
    }
}